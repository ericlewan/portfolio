backend:
  name: git-gateway
  branch: main

media_folder: "public/Images/uploads"
public_folder: "/Images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    extension: "md"
    summary: "{{title}} — {{date}}"
    preview_path: "blog/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "HTML allowed, e.g. First part<br /><em>italic part</em>" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "case-studies"
    label: "Case Studies"
    folder: "src/content/case-studies"
    create: true
    extension: "mdx"
    format: "frontmatter"
    summary: "{{title}} ({{eyebrow}})"
    preview_path: "cs/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "HTML allowed, e.g. Title<br /><em>subtitle</em>" }
      - { label: "Eyebrow", name: "eyebrow", widget: "string", hint: "e.g. Quidget · 2024" }
      - { label: "Company", name: "company", widget: "string" }
      - { label: "Company URL", name: "companyUrl", widget: "string", required: false }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Timeline", name: "timeline", widget: "string" }
      - { label: "Intro", name: "intro", widget: "text" }
      - { label: "Hero Image", name: "heroImage", widget: "image" }
      - { label: "Hero Image Alt", name: "heroImageAlt", widget: "string" }
      - { label: "Hero Background", name: "heroBg", widget: "select", options: ["pale", "dark", "headway", "blue", "dark-green"] }
      - { label: "Description (SEO)", name: "description", widget: "text" }
      - { label: "Copyright notice", name: "copyright", widget: "boolean", default: false }
      - { label: "Work in progress (locks card on home page)", name: "wip", widget: "boolean", default: false }
      - { label: "Sort order", name: "order", widget: "number" }
      - { label: "Body", name: "body", widget: "markdown" }
