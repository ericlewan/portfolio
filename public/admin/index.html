<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* ── Admin chrome improvements ──────────────────────────── */
      @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400;500&display=swap');

      :root {
        --cms-accent: #FF5500;
      }

      /* Base font */
      body, input, textarea, select, button {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Tighten up the loading screen */
      #nc-root {
        font-family: 'Geist', sans-serif;
      }

      /* Primary action buttons → accent orange */
      button[class*="success"],
      button[class*="primary"] {
        background-color: var(--cms-accent) !important;
        border-color: var(--cms-accent) !important;
      }

      /* Make the preview pane fill the frame cleanly */
      iframe {
        border: none;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="/admin/preview.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function (user) {
          if (!user) {
            window.netlifyIdentity.on('login', function () {
              document.location.href = '/admin/';
            });
          }
        });
      }
    </script>
  </body>
</html>
